<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Social Media Innovation in AI and AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin:0;overflow:hidden">
  <a-scene
    mindar-image="imageTargetSrc:./targets.mind"
    color-space="sRGB"
    renderer="colorManagement:true,physicallyCorrectLights"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

    <!-- This entity appears when image is detected -->
    <a-entity mindar-image-target="targetIndex:0">

      <!-- Floating animated text over your target -->
      <a-text
        value="Edger Msamba, am from Tanzania,"
        position="0 0.2 0"
        scale="0.2 0.2 0.2"
        color="#00E5FF"
        align="center"
        animation="property:position;to:0 0.5 0;dir:alternate;loop:true;dur:1500">
      </a-text>
       <a-text
        value="My Father's name is Ernest Msamba"
        position="0 0.5 0"
        scale="0.2 0.2 0.2"
        color="#FFC0CB"
        align="center"
        animation="property:position;to:0 0.5 0;dir:alternate;loop:true;dur:1500">
      </a-text>
    </a-entity>
  </a-scene>
</body>
</html>
